version: 2

models:
  - name: stg_yellow_taxi_trips
    description: "Données de trajets nettoyées et enrichies"
    columns:
      - name: trip_duration_minutes
        description: "Durée du trajet en minutes"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 3000  # Plus souple pour les données réelles
      
      - name: avg_speed_mph
        description: "Vitesse moyenne en miles par heure"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 200  # Pour accepter les anomalies GPS
      
      - name: tip_percentage
        description: "Pourcentage de pourboire"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1000 # Certains clients sont très généreux !
